# Production Training Configuration - YOLOv11
# Maximum accuracy for deployment with latest model

model:
  architecture: "yolo11x"  # Latest YOLOv11 for maximum accuracy
  pretrained: true
  weights: "yolo11x.pt"    # Latest pretrained weights

training:
  epochs: 500             # Extended training for YOLOv11
  batch_size: 4           # Smaller batch for stability
  image_size: 1600        # Maximum resolution for YOLOv11
  patience: 150           # More patience for convergence
  save_period: 5
  
  lr0: 0.0005             # Lower learning rate for stability
  lrf: 0.005
  momentum: 0.937
  weight_decay: 0.001     # Higher weight decay
  warmup_epochs: 10       # Longer warmup
  warmup_momentum: 0.8
  warmup_bias_lr: 0.05

loss:
  box: 8.0                # Higher box loss weight
  cls: 0.3                # Lower class loss weight
  dfl: 2.0                # Higher DFL weight

optimizer:
  type: "AdamW"           # Best for small objects
  betas: [0.9, 0.999]
  eps: 1e-8

data:
  workers: 8
  pin_memory: true
  persistent_workers: true

augmentation:
  # Conservative augmentation for production
  degrees: 5.0            # Minimal rotation
  translate: 0.05         # Small translations
  scale: 0.2              # Conservative scaling
  shear: 1.0              # Minimal shear
  perspective: 0.0        # No perspective
  hsv_h: 0.01             # Minimal color changes
  hsv_s: 0.3
  hsv_v: 0.2
  mosaic: 0.9             # High mosaic
  mixup: 0.15             # Moderate mixup
  copy_paste: 0.3         # High copy-paste

validation:
  interval: 1
  save_json: true
  save_hybrid: true
  conf_threshold: 0.001
  iou_threshold: 0.6
  max_detections: 300

device: "cpu"             # Change to "0" for GPU
amp: true
deterministic: true
seed: 42

logging:
  project: "electrical_components"
  name: "electrical_production"
  save_dir: "../results/experiments"
  log_imgs: 32
  log_plots: true

early_stopping:
  enabled: true
  patience: 100
  min_delta: 0.0001       # Very small delta

export:
  formats: ["pt", "onnx", "torchscript", "tflite"]
  optimize: true
  half: true              # Half precision for deployment
  dynamic: true
  simplify: true

targets:
  map50: 0.95             # High targets for production
  map50_95: 0.85
  precision: 0.90
  recall: 0.90
  inference_time: 100     # Allow more time for accuracy

# Advanced settings for production
advanced:
  label_smoothing: 0.1    # Label smoothing
  nms_agnostic: false     # Class-specific NMS
  multi_scale: true       # Multi-scale training
  rect_training: false    # Rectangular training
  cos_lr: true            # Cosine learning rate
  close_mosaic: 20        # Close mosaic in last epochs
