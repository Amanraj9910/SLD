name: Build and deploy Node.js app to Azure Web App - SLD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        working-directory: web_app/core/frontend
        env:
          CI: false
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Prepare ZIP Artifact
        run: |
          mkdir build-output
          cp -r web_app/core/frontend/build/* build-output/
          cd build-output
          zip -r ../build.zip .
        shell: bash

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-zip
          path: build.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: build-zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1057BC1342854205B49DF4ACB760B59D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FE596410D2E744ACAA040BC5CEFDA6B6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5C964D7E62C244BCBCFE7429E90721CD }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SLD'
          slot-name: 'Production'
          package: build.zip
