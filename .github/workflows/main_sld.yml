name: Build and Deploy to Azure Web App - SLD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: SLD
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20.x'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build React Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web_app/core/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: web_app/core/frontend
        run: npm ci

      - name: Build frontend
        working-directory: web_app/core/frontend
        env:
          CI: false
        run: npm run build

      # Set up Python for backend validation
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python imports
        run: |
          cd web_app/core/backend
          python -c "from main import app; print('✅ Backend import successful')"

      # Create deployment package with both frontend and backend
      - name: Prepare deployment package
        run: |
          # Create deployment directory
          mkdir -p deploy
          
          # Copy backend files
          cp -r web_app deploy/
          cp -r component_detection deploy/ 2>/dev/null || true
          cp -r text_detection deploy/ 2>/dev/null || true
          
          # Copy root config files
          cp requirements.txt deploy/
          cp app.py deploy/
          cp startup.sh deploy/ 2>/dev/null || true
          cp Procfile deploy/ 2>/dev/null || true
          cp .deployment deploy/ 2>/dev/null || true
          cp oryx-manifest.toml deploy/ 2>/dev/null || true
          cp runtime.txt deploy/ 2>/dev/null || true
          
          # Ensure frontend build is in place
          echo "Frontend build contents:"
          ls -la deploy/web_app/core/frontend/build/ 2>/dev/null || echo "No build found"
          
          # Create zip
          cd deploy
          zip -r ../deploy.zip . -x "*.pyc" -x "__pycache__/*" -x "*.git*" -x "node_modules/*" -x ".venv/*"
          cd ..
          
          echo "Deployment package created:"
          ls -lh deploy.zip

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: |
          unzip deploy.zip -d ./deploy
          ls -la ./deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1057BC1342854205B49DF4ACB760B59D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FE596410D2E744ACAA040BC5CEFDA6B6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5C964D7E62C244BCBCFE7429E90721CD }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          package: ./deploy
